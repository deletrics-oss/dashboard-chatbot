<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Chatbot - Painel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #333;
      color: white;
      padding: 10px;
      text-align: center;
    }
    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    input {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    pre {
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard Chatbot - Painel</h1>
  </header>
  <main>
    <div class="card">
      <h2>🔑 Login</h2>
      <input id="username" placeholder="Usuário"><br>
      <input id="password" type="password" placeholder="Senha"><br>
      <button onclick="login()">Entrar</button>
      <p id="loginMsg"></p>
    </div>

    <div class="card">
      <h2>📜 Logs do Cliente</h2>
      <input id="numero" placeholder="Ex: 559999999999"><br>
      <button onclick="verLogs()">Ver Logs</button>
      <pre id="logs"></pre>
    </div>

    <div class="card">
      <h2>♻️ Resetar Sessão WhatsApp</h2>
      <button onclick="resetarSessao()">Resetar</button>
      <p id="resetMsg"></p>
    </div>
  </main>

  <script>
    async function login() {
      let username = document.getElementById("username").value;
      let password = document.getElementById("password").value;
      let res = await fetch("http://localhost:4000/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, password})
      });
      let data = await res.json();
      document.getElementById("loginMsg").innerText = JSON.stringify(data);
    }

    async function verLogs() {
      let numero = document.getElementById("numero").value;
      let res = await fetch(`http://localhost:4000/api/session-log/${numero}`);
      let data = await res.json();
      document.getElementById("logs").innerText = JSON.stringify(data, null, 2);
    }

    async function resetarSessao() {
      let res = await fetch("http://localhost:4000/api/device/session", {
        method: "DELETE"
      });
      let data = await res.json();
      document.getElementById("resetMsg").innerText = JSON.stringify(data);
    }
  </script>
</body>
</html>
