
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Chatbot</title>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <h1>Gerenciamento de Dispositivos</h1>
  <div id="devices"></div>
  <script>
    const socket = io();
    function renderDevice(dev){
      const div = document.createElement('div');
      div.innerHTML = `
        <h3>${dev.id} (${dev.status})</h3>
        ${dev.me ? `<p>Número: ${dev.me}</p>` : ""}
        <button onclick="removeDevice('${dev.id}')">Remover</button>
        ${dev.me ? `<button onclick="viewLog('${dev.me}')">Ver Log</button>` : ""}
        <div>${dev.qr ? '<img src="'+dev.qr+'" width="200"/>' : ''}</div>
        <hr/>
      `;
      return div;
    }
    function removeDevice(id){
      socket.emit("removeDevice",{id:id,purge:true});
    }
    function viewLog(phone){
      window.open("/api/logs/"+phone,"_blank");
    }
    socket.on("devices", (list)=>{
      const c = document.getElementById('devices');
      c.innerHTML="";
      list.forEach(d=>c.appendChild(renderDevice(d)));
    });
    socket.on("device", (d)=>{
      const c = document.getElementById('devices');
      c.appendChild(renderDevice(d));
    });
    socket.on("qr",(d)=>{location.reload();});
    socket.on("ready",(d)=>{location.reload();});
    socket.on("status",(d)=>{location.reload();});
    socket.on("removed",(d)=>{location.reload();});
  </script>
</body>
</html>
