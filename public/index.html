<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>ChatBot Host</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="/socket.io/socket.io.js"></script>
  <!-- Chart.js para o gráfico -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="sidebar">
    <h2>ChatBot Host</h2>
    <button id="btn-add-device">+ Adicionar Dispositivo</button>
    <ul id="devices"></ul>
    <button id="btn-sair">Sair</button>
  </div>

  <div id="main">
    <!-- Status -->
    <div id="status-bar">
      <div id="status-conn">Status: <span id="wa-status">Conectando...</span></div>
      <div id="status-msgs">Mensagens Hoje: <span id="msgs-today">0</span></div>
      <div id="status-users">Usuários Ativos: <span id="users-active">0</span></div>
      <div id="status-time">Tempo Ativo: <span id="time-active">0m</span></div>
    </div>

    <!-- Logs fixos -->
    <div id="logs-panel">
      <h3>Logs do Sistema</h3>
      <div id="logs"></div>
    </div>

    <!-- QR -->
    <div id="qr-panel">
      <h3>Autenticação WhatsApp</h3>
      <div id="qr-container"></div>
      <button id="btn-new-qr">Gerar Novo QR</button>
    </div>

    <!-- Mensagens por hora -->
    <div id="chart-panel">
      <h3>Mensagens por Hora</h3>
      <canvas id="chart" width="600" height="250"></canvas>
    </div>

    <!-- Lógicas -->
    <div id="logics-panel">
      <h3>Lógicas Ativas</h3>
      <table id="logics-table">
        <thead>
          <tr><th>Arquivo</th><th>Nome</th><th>Ações</th></tr>
        </thead>
        <tbody></tbody>
      </table>

      <h4>Lixeira</h4>
      <ul id="trash-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
