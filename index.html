<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Chatbot Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-container">
        <h2>Login</h2>
        <p id="login-error" style="color: red; display: none;">Utilizador ou palavra-passe incorretos</p>
        <form id="login-form">
            <label for="username">Utilizador</label>
            <input type="text" id="username" required>
            <label for="password">Palavra-passe</label>
            <input type="password" id="password" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <div id="dashboard" style="display: none;">
        <header>
            <h1>Fight Arcade</h1>
            <button id="add-device">Adicionar Dispositivo</button>
            <button id="logout">Sair</button>
        </header>
        <main>
            <h2>Bem-vindo</h2>
            <p>Selecione um dispositivo ou adicione um novo para começar.</p>
            <!-- Aqui vão os dispositivos e conteúdos -->
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
