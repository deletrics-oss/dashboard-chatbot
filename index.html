<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Chatbot Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }
        .sidebar { transition: width 0.3s; }
        .device-link.active { background-color: #4f46e5; color: white; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="login-screen" class="flex items-center justify-center h-screen w-full">
        <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-lg">
            <h1 class="text-3xl font-bold text-center text-gray-800">Login</h1>
            <form id="login-form">
                <div>
                    <label for="username" class="text-sm font-medium text-gray-700">Usuário</label>
                    <input id="username" type="text" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="mt-4">
                    <label for="password" class="text-sm font-medium text-gray-700">Senha</label>
                    <input id="password" type="password" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div id="login-error" class="hidden mt-2 text-sm text-red-600">Usuário ou senha inválidos.</div>
                <div class="mt-6">
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex h-screen w-full">
        <aside class="sidebar w-64 bg-gray-800 text-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-xl font-bold">Chatbot Host</h1>
                <span id="logged-in-user" class="text-xs text-gray-400"></span>
            </div>
            <div class="p-4">
                <button id="add-device-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-md text-sm font-medium">
                    Adicionar Dispositivo
                </button>
            </div>
            <nav id="device-list" class="flex-1 p-4 space-y-2 overflow-y-auto"></nav>
            <div class="p-4 border-t border-gray-700">
                <button id="logout-btn" class="w-full text-left text-gray-400 hover:text-white text-sm">Sair</button>
            </div>
        </aside>

        <main id="main-content" class="flex-1 p-6 overflow-y-auto">
            <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center">
                <h2 class="text-2xl font-bold text-gray-700">Bem-vindo ao Painel</h2>
                <p class="text-gray-500 mt-2">Selecione um dispositivo na barra lateral ou adicione um novo para começar.</p>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let currentDevice = null;

        // Elementos da UI
        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loggedInUser = document.getElementById('logged-in-user');
        const deviceList = document.getElementById('device-list');
        const mainContent = document.getElementById('main-content');
        const addDeviceBtn = document.getElementById('add-device-btn');
        const logoutBtn = document.getElementById('logout-btn');

        // Lógica de Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            loginError.classList.add('hidden'); // Esconde erro antigo
            socket.emit('authenticate', { username, password });
        });

        socket.on('authenticated', (data) => {
            currentUser = data.username;
            loggedInUser.textContent = `Usuário: ${currentUser}`;
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
        });

        socket.on('unauthorized', () => {
            loginError.classList.remove('hidden');
        });

        // Lógica do Painel
        socket.on('client_list', (clients) => {
            deviceList.innerHTML = '';
            clients.forEach(client => addDeviceToList(client.id, client.status));
        });

        socket.on('client_added', data => (data.username === currentUser) && addDeviceToList(data.id, data.status));
        socket.on('client_removed', data => (data.username === currentUser) && removeDeviceFromList(data.id));
        socket.on('client_update', data => (data.username === currentUser) && updateDeviceStatus(data.id, data.status));
        socket.on('qr_code', data => (data.username === currentUser && data.clientId === currentDevice) && showQRCode(data.qrData));
        socket.on('qr_code_clear', data => (data.username === currentUser && data.clientId === currentDevice) && clearQRCode());
        socket.on('new_log', data => (data.username === currentUser && data.clientId === currentDevice) && addLogEntry(data.log));
        socket.on('new_message', data => (data.username === currentUser && data.clientId === currentDevice) && addMessageEntry(data.message));
        socket.on('stats_update', data => (data.username === currentUser && data.clientId === currentDevice) && updateStats(data));

        function addDeviceToList(id, status) {
            const existing = deviceList.querySelector(`[data-device-id="${id}"]`);
            if (existing) {
                updateDeviceStatus(id, status);
                return;
            }
            const el = document.createElement('div');
            el.className = 'device-link flex items-center gap-3 p-2 text-sm rounded-lg cursor-pointer hover:bg-gray-700';
            el.dataset.deviceId = id;
            el.innerHTML = `
                <div class="w-2.5 h-2.5 rounded-full"></div>
                <span class="flex-1 font-medium">${id}</span>
                <button class="delete-device text-red-400 hover:text-red-300 text-xl font-bold">&times;</button>
            `;
            updateDeviceStatusEl(el, status);
            el.addEventListener('click', e => !e.target.closest('.delete-device') && selectDevice(id));
            el.querySelector('.delete-device').addEventListener('click', e => {
                e.stopPropagation();
                if (confirm(`Tem certeza que deseja remover "${id}"?`)) {
                    socket.emit('delete_client', id);
                }
            });
            deviceList.appendChild(el);
        }

        function removeDeviceFromList(id) {
            const el = deviceList.querySelector(`[data-device-id="${id}"]`);
            if (el) el.remove();
            if (currentDevice === id) showWelcomeScreen();
        }

        function updateDeviceStatus(id, status) {
            const el = deviceList.querySelector(`[data-device-id="${id}"]`);
            if (el) updateDeviceStatusEl(el, status);
            if (id === currentDevice) {
                const statusText = document.getElementById('status-text');
                if (statusText) statusText.textContent = status;
            }
        }
        
        function updateDeviceStatusEl(el, status) {
            const dot = el.querySelector('.w-2\\.5');
            const colors = {
                'Conectado': 'bg-green-500', 'Aguardando QR': 'bg-yellow-500',
                'A inicializar': 'bg-blue-500', 'Desconectado': 'bg-red-500',
                'Reiniciando': 'bg-yellow-500'
            };
            dot.className = `w-2.5 h-2.5 rounded-full ${colors[status] || 'bg-gray-500'}`;
        }
        
        function selectDevice(id) {
            currentDevice = id;
            document.querySelectorAll('.device-link').forEach(el => el.classList.remove('active'));
            const selectedEl = deviceList.querySelector(`[data-device-id="${id}"]`);
            if (selectedEl) selectedEl.classList.add('active');
            showDeviceScreen(id);
            socket.emit('request_device_data', id);
        }

        function showDeviceScreen(id) {
            mainContent.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Painel: <span class="text-indigo-600">${id}</span></h2>
                    <button id="reconnect-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">Reconectar</button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="text-sm font-medium text-gray-500">Status</h3>
                        <p id="status-text" class="text-2xl font-semibold text-gray-800">Carregando...</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="text-sm font-medium text-gray-500">Mensagens Hoje</h3>
                        <p id="messages-count" class="text-2xl font-semibold text-gray-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="text-sm font-medium text-gray-500">Usuários Ativos</h3>
                        <p id="users-count" class="text-2xl font-semibold text-gray-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow">
                        <h3 class="text-sm font-medium text-gray-500">Uptime</h3>
                        <p id="uptime-text" class="text-2xl font-semibold text-gray-800">N/A</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-semibold text-gray-700 mb-4">Autenticação WhatsApp</h3>
                        <div id="qr-container" class="min-h-[250px] flex items-center justify-center">
                            <p class="text-gray-500">Aguardando conexão...</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-lg font-semibold text-gray-700 mb-4">Logs do Sistema</h3>
                        <div id="logs-container" class="bg-gray-900 text-gray-200 p-4 rounded-lg h-64 overflow-y-auto text-sm font-mono"></div>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-lg shadow mt-6">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">Mensagens Recentes</h3>
                    <div id="messages-container" class="space-y-2 max-h-80 overflow-y-auto"></div>
                </div>
            `;
            document.getElementById('reconnect-btn').addEventListener('click', () => socket.emit('reconnect_client', id));
        }
        
        function showWelcomeScreen() {
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center">
                    <h2 class="text-2xl font-bold text-gray-700">Bem-vindo ao Painel</h2>
                    <p class="text-gray-500 mt-2">Selecione um dispositivo na barra lateral ou adicione um novo para começar.</p>
                </div>`;
            currentDevice = null;
        }

        // Funções para atualizar a UI
        function showQRCode(qrData) {
            const qrContainer = document.getElementById('qr-container');
            if(qrContainer) qrContainer.innerHTML = `<img src="${qrData}" alt="QR Code">`;
        }

        function clearQRCode() {
            const qrContainer = document.getElementById('qr-container');
            if(qrContainer) qrContainer.innerHTML = `<div class="text-green-600 font-semibold p-4">✅ Conectado com sucesso!</div>`;
        }

        function addLogEntry(log) {
            const container = document.getElementById('logs-container');
            if (!container) return;
            const entry = document.createElement('div');
            entry.textContent = `[${new Date(log.timestamp).toLocaleTimeString()}] ${log.message}`;
            container.prepend(entry);
        }

        function addMessageEntry(message) {
            const container = document.getElementById('messages-container');
            if (!container) return;
            const entry = document.createElement('div');
            entry.className = `p-2 rounded-lg ${message.type === 'user' ? 'bg-gray-200' : 'bg-blue-100'}`;
            entry.innerHTML = `<strong class="text-sm">${message.from}</strong><p class="text-xs">${message.body}</p>`;
            container.prepend(entry);
        }

        function updateStats(data) {
            const messagesEl = document.getElementById('messages-count');
            const usersEl = document.getElementById('users-count');
            if(messagesEl) messagesEl.textContent = data.messagesToday;
            if(usersEl) usersEl.textContent = data.activeUsers;
        }

        addDeviceBtn.addEventListener('click', () => {
            const id = prompt('Digite o ID do novo dispositivo (ex: meu-bot):');
            if (id && id.trim()) socket.emit('add_client', id.trim());
        });

        logoutBtn.addEventListener('click', () => {
            currentUser = null;
            loginScreen.classList.remove('hidden');
            dashboardScreen.classList.add('hidden');
            document.getElementById('login-form').reset();
        });

        // Inicialização
        showWelcomeScreen();
    </script>
</body>
</html>
